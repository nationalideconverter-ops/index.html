<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayda ID Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #050505; color: white; }
        canvas { border: 1px solid #333; border-radius: 10px; }
        .controls button { background: #1e293b; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-center text-blue-500 font-black text-2xl mb-6">FAYDA GEN PRO</h1>

    <div class="max-w-xl mx-auto space-y-6">
        <div class="bg-zinc-900 p-4 rounded-2xl">
            <label class="block text-sm mb-2">የፋይዳ ስክሪንሾት ይምረጡ</label>
            <input type="file" id="imageLoader" class="w-full text-sm text-gray-400">
        </div>

        <div class="relative flex justify-center">
            <canvas id="idCanvas"></canvas>
        </div>

        <div class="controls grid grid-cols-3 gap-2">
            <button onclick="zoomIn()">Zoom +</button>
            <button onclick="zoomOut()">Zoom -</button>
            <button onclick="rotate()">Rotate ↻</button>
        </div>

        <button onclick="downloadID()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg shadow-lg">
            ለህትመት አዘጋጅና አውርድ (Download)
        </button>
    </div>

    <script>
        // 1. ካንቫሱን ማዘጋጀት (መጠኑን 1011x638 አድርገነዋል ለጥራት)
        const canvas = new fabric.Canvas('idCanvas', {
            width: 350,  // በስልክ እንዲታይ ትንሽ እናድርገው
            height: 220,
            backgroundColor: '#fff'
        });

        const ID_WIDTH = 1011;
        const ID_HEIGHT = 638;

        // 2. የካርድ ፍሬሙን መጫን (ይህ ምስል መሃሉ ክፍት መሆን አለበት)
        let overlayFrame;
        fabric.Image.fromURL('https://your-domain.com/frame-front.png', function(img) {
            overlayFrame = img;
            img.set({
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height,
                selectable: false,
                evented: false
            });
            canvas.add(img);
        });

        // 3. ተጠቃሚው ምስል ሲጭን
        document.getElementById('imageLoader').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function() {
                    const idImg = new fabric.Image(imgObj);
                    idImg.set({
                        left: 50,
                        top: 50,
                        scaleX: 0.2,
                        scaleY: 0.2
                    });
                    canvas.add(idImg);
                    canvas.sendToBack(idImg); // ፎቶው ከፍሬሙ ስር እንዲሆን
                    canvas.setActiveObject(idImg);
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        // 4. ፋንክሽኖች
        function zoomIn() { 
            const obj = canvas.getActiveObject();
            if(obj) { obj.scale(obj.scaleX * 1.1); canvas.renderAll(); }
        }
        function zoomOut() { 
            const obj = canvas.getActiveObject();
            if(obj) { obj.scale(obj.scaleX * 0.9); canvas.renderAll(); }
        }
        function rotate() { 
            const obj = canvas.getActiveObject();
            if(obj) { obj.rotate(obj.angle + 90); canvas.renderAll(); }
        }

        // 5. ማውረጃ
        function downloadID() {
            // ለማውረድ መጠኑን ወደ ትልቁ (1011x638) እንቀይረዋለን
            const dataURL = canvas.toDataURL({
                format: 'png',
                multiplier: 1011 / canvas.width // ትክክለኛውን ጥራት ለመጠበቅ
            });
            const link = document.createElement('a');
            link.download = 'Fayda_Card.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
