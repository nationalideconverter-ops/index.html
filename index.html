<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        .container { display: flex; flex-direction: column; align-items: center; background: #000; color: white; padding: 20px; }
        canvas { border: 2px solid #333; margin-bottom: 20px; }
        .btn { background: #3b82f6; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="container">
    <input type="file" id="imgLoader" style="margin-bottom: 20px;">
    <canvas id="c" width="1011" height="638"></canvas>
    <button class="btn" onclick="download()">አውርድ (Download)</button>

    <script>
        var canvas = new fabric.Canvas('c');
        var frameUrl = 'https://nationalidconvertor.com/images/front-fayda-new.png';

        // 1. ባዶውን ፍሬም ከላይ መጫን
        fabric.Image.fromURL(frameUrl, function(img) {
            canvas.setOverlayImage(img, canvas.renderAll.bind(canvas), {
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height
            });
        });

        // 2. ተጠቃሚው ፎቶ ሲጭን
        document.getElementById('imgLoader').onchange = function(e) {
            var reader = new FileReader();
            reader.onload = function(event) {
                var imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function() {
                    var image = new fabric.Image(imgObj);
                    image.scale(0.5);
                    canvas.add(image);
                    canvas.sendToBack(image); // ፎቶው ከፍሬሙ ስር እንዲሆን
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function download() {
            var link = document.createElement('a');
            link.download = 'Fayda_ID.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        }
    </script>
</body>
</html>
