<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayda ID Printer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .card-panel { background: #111; border: 1px solid #222; border-radius: 1.5rem; }
        .input-style { background: #000; border: 1px solid #333; width: 100%; padding: 0.8rem; border-radius: 0.8rem; color: white; outline: none; }
        .input-style:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center py-4 mb-6">
        <h1 class="text-xl font-black italic text-blue-500">FAYDA GEN</h1>
        <div id="pointsDisplay" class="bg-blue-900/30 text-blue-400 px-4 py-1 rounded-full text-sm border border-blue-800">
            Points: 0
        </div>
    </div>

    <div class="card-panel p-6 mb-6">
        <h2 class="text-orange-500 font-bold mb-1">ብር ለመላክ / Buy Points</h2>
        <p class="text-xs text-gray-500 mb-4">ለ 0974732536 በቴሌብር ልከው የትራንዛክሽን ቁጥሩን ያስገቡ</p>
        <input type="text" id="refInput" placeholder="Transaction ID (e.g. CKM...)" class="input-style mb-4">
        <button onclick="submitPayment()" class="w-full bg-white text-black font-bold py-3 rounded-xl active:scale-95 transition">
            Confirm Payment
        </button>
    </div>

    <div class="card-panel p-6">
        <h2 class="font-bold mb-4">የመታወቂያ ስክሪንሾቶችን ይጫኑ</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-bold">FRONT SIDE (የፊት ገጽ)</label>
                <input type="file" id="frontImg" accept="image/*" class="text-sm">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-bold">BACK SIDE (የጀርባ ገጽ)</label>
                <input type="file" id="backImg" accept="image/*" class="text-sm">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-bold">PROFILE/QR (ፕሮፋይል)</label>
                <input type="file" id="profileImg" accept="image/*" class="text-sm">
            </div>
            
            <button onclick="processAndDownload()" class="w-full bg-blue-600 font-bold py-4 rounded-xl mt-4 shadow-lg shadow-blue-900/20 active:scale-95 transition">
                ለህትመት አዘጋጅ (Download)
            </button>
        </div>
    </div>

    <canvas id="idCanvas" width="1011" height="638" style="display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
